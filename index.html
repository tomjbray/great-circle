<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Great Circle Route</title>

  <!-- Leaflet CSS for the interactive map -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <!-- Google Fonts: distinctive editorial pairing -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #f0a500;
      --accent2:  #e05c2a;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #3fb950;
      --card:     #1c2128;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.06em;
      color: var(--accent);
    }
    header span {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Airport input block */
    .airport-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color 0.2s;
    }
    .airport-block:focus-within {
      border-color: var(--accent);
    }
    .airport-block .leg-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }
    .leg-dot.dest { background: var(--accent2); }
    .leg-label.dest { color: var(--accent2); }

    .iata-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .iata-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.12em;
      width: 90px;
      padding: 8px 12px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }
    .iata-input:focus { border-color: var(--accent); }
    .iata-input.dest:focus { border-color: var(--accent2); }
    .iata-input::placeholder { color: var(--border); }

    .airport-info {
      flex: 1;
      min-height: 44px;
    }
    .airport-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .airport-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .airport-error {
      font-size: 12px;
      color: #f85149;
    }
    .airport-searching {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Divider with plane icon ── */
    .route-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
    }
    .route-divider::before,
    .route-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .plane-icon {
      color: var(--muted);
      font-size: 18px;
      transform: rotate(45deg);
    }

    /* ── Calculate button ── */
    .calc-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.1em;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.15s;
    }
    .calc-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .calc-btn:active { transform: translateY(0); }
    .calc-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Results panel ── */
    .results {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .results.visible { display: flex; }

    .result-route {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.08em;
    }
    .result-route .orig { color: var(--accent); }
    .result-route .dest { color: var(--accent2); }
    .result-route .arrow { color: var(--muted); font-size: 18px; }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stat-box .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--green);
    }
    .stat-box .lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      background: #0d1117;
      min-height: 500px;
    }

    /* ── Empty state overlay ── */
    .map-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
      z-index: 1000;
      background: rgba(13,17,23,0.7);
    }
    .map-empty .big-icon { font-size: 52px; opacity: 0.3; }
    .map-empty p { color: var(--muted); font-size: 14px; }
    .map-empty.hidden { display: none; }

    /* ── Leaflet dark overrides ── */
    .leaflet-container { background: #0d1117 !important; }
    .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.7); }
    .leaflet-control-attribution {
      background: rgba(13,17,23,0.8) !important;
      color: var(--muted) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--muted) !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      #map { min-height: 320px; }
      header { padding: 14px 18px; }
      .sidebar { padding: 18px 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Great Circle Route</h1>
  <span>Enter two IATA codes to plot the shortest path between airports</span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Origin airport -->
    <div>
      <div class="section-label">Origin</div>
      <div class="airport-block" id="origBlock">
        <div class="leg-label"><span class="leg-dot"></span> Departure</div>
        <div class="iata-row">
          <input class="iata-input" id="origInput" maxlength="3" placeholder="LHR" autocomplete="off" spellcheck="false">
          <div class="airport-info" id="origInfo"></div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="route-divider"><span class="plane-icon">✈</span></div>

    <!-- Destination airport -->
    <div>
      <div class="section-label">Destination</div>
      <div class="airport-block" id="destBlock">
        <div class="leg-label dest"><span class="leg-dot dest"></span> Arrival</div>
        <div class="iata-row">
          <input class="iata-input dest" id="destInput" maxlength="3" placeholder="JFK" autocomplete="off" spellcheck="false">
          <div class="airport-info" id="destInfo"></div>
        </div>
      </div>
    </div>

    <!-- Calculate button -->
    <button class="calc-btn" id="calcBtn" onclick="plotRoute()" disabled>
      ✈ Plot Great Circle Route
    </button>

    <!-- Results -->
    <div class="results" id="results">
      <div class="section-label">Route Summary</div>
      <div class="result-route">
        <span class="orig" id="resOrig">—</span>
        <span class="arrow">→</span>
        <span class="dest" id="resDest">—</span>
      </div>
      <div class="result-stats">
        <div class="stat-box">
          <div class="val" id="resDist">—</div>
          <div class="lbl">Distance (km)</div>
        </div>
        <div class="stat-box">
          <div class="val" id="resMiles">—</div>
          <div class="lbl">Distance (miles)</div>
        </div>
        <div class="stat-box">
          <div class="val" id="resOrigCoords">—</div>
          <div class="lbl">Origin coords</div>
        </div>
        <div class="stat-box">
          <div class="val" id="resDestCoords">—</div>
          <div class="lbl">Dest coords</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Map ── -->
  <div style="position:relative; flex:1;">
    <div class="map-empty" id="mapEmpty">
      <div class="big-icon">🌍</div>
      <p>Enter two airport codes to see the route</p>
    </div>
    <div id="map"></div>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════
//  AIRPORT DATABASE
//  Loaded from airports.json (same folder as this HTML file).
//  This approach keeps the HTML clean and allows easy updates.
//  Requires a web server — use VS Code Live Server or GitHub Pages.
// ════════════════════════════════════════════════════════════

let AIRPORTS = {};
let dbLoaded  = false;
let dbError   = false;

// fetch() loads the JSON file from the same folder as this HTML
// This only works via a web server (not file://) — see README
async function loadAirportDB() {
  try {
    const res = await fetch('./airports.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    AIRPORTS = await res.json();
    dbLoaded = true;
    console.log('Airport DB loaded:', Object.keys(AIRPORTS).length, 'airports');
    // Re-run any pending lookups now that DB is ready
    const ov = document.getElementById('origInput').value;
    const dv = document.getElementById('destInput').value;
    if (ov.length === 3) lookupAirport(ov, document.getElementById('origInfo'), true);
    if (dv.length === 3) lookupAirport(dv, document.getElementById('destInfo'), false);
  } catch(e) {
    dbError = true;
    console.error('Failed to load airports.json:', e);
    document.getElementById('origInfo').innerHTML =
      '<div class="airport-error">⚠️ airports.json not found — open via Live Server, not file://</div>';
  }
}

function lookupCode(iata) {
  const d = AIRPORTS[iata.toUpperCase().trim()];
  if (!d) return null;
  return { iata: iata.toUpperCase(), name: d[0], country: d[1], city: d[2], lat: d[3], lon: d[4] };
}

// ════════════════════════════════════════════════════════════
//  MAP SETUP


// ════════════════════════════════════════════════════════════

const map = L.map('map', {
  center: [20, 0],
  zoom: 2,
  zoomControl: true,
  attributionControl: true,
});

// OpenStreetMap tiles (free, no API key)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

let routeLayers = [];   // Track drawn layers so we can clear them on each new plot

function clearRoute() {
  routeLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];
}


// ════════════════════════════════════════════════════════════
//  GREAT CIRCLE MATHS
// ════════════════════════════════════════════════════════════

const R = 6371; // Earth's mean radius in kilometres

function toRad(deg) { return deg * Math.PI / 180; }
function toDeg(rad) { return rad * 180 / Math.PI; }

// Haversine formula — calculates the shortest distance between two points on a sphere
function haversineKm(lat1, lon1, lat2, lon2) {
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2) ** 2
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Generate N intermediate points along the great circle arc
// This lets us draw a curved line on the map that follows the Earth's surface
function greatCirclePoints(lat1, lon1, lat2, lon2, n = 100) {
  const points = [];
  const φ1 = toRad(lat1), λ1 = toRad(lon1);
  const φ2 = toRad(lat2), λ2 = toRad(lon2);

  // Angular distance between the two points
  const d = 2 * Math.asin(Math.sqrt(
    Math.sin((φ2 - φ1)/2) ** 2 +
    Math.cos(φ1) * Math.cos(φ2) * Math.sin((λ2 - λ1)/2) ** 2
  ));

  if (d === 0) return [[lat1, lon1]]; // Same point

  for (let i = 0; i <= n; i++) {
    const f = i / n; // fraction along the route (0 = origin, 1 = destination)
    const A = Math.sin((1 - f) * d) / Math.sin(d);
    const B = Math.sin(f * d)       / Math.sin(d);
    const x = A * Math.cos(φ1) * Math.cos(λ1) + B * Math.cos(φ2) * Math.cos(λ2);
    const y = A * Math.cos(φ1) * Math.sin(λ1) + B * Math.cos(φ2) * Math.sin(λ2);
    const z = A * Math.sin(φ1)                 + B * Math.sin(φ2);
    const lat = toDeg(Math.atan2(z, Math.sqrt(x*x + y*y)));
    const lon = toDeg(Math.atan2(y, x));
    points.push([lat, lon]);
  }
  return points;
}

// Antimeridian fix: split lines that cross ±180° longitude
// Without this, Leaflet draws a line across the entire map width
function splitAtAntimeridian(points) {
  const segments = [[]];
  for (let i = 0; i < points.length; i++) {
    segments[segments.length - 1].push(points[i]);
    if (i < points.length - 1) {
      const dLon = points[i+1][1] - points[i][1];
      if (Math.abs(dLon) > 180) {
        segments.push([]); // Start a new segment
      }
    }
  }
  return segments.filter(s => s.length > 1);
}


// ════════════════════════════════════════════════════════════
//  CUSTOM MAP MARKERS
// ════════════════════════════════════════════════════════════

function makeMarker(lat, lon, iata, color) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:${color};
      color:#0d1117;
      font-family:'Bebas Neue',sans-serif;
      font-size:12px;
      letter-spacing:0.08em;
      padding:4px 8px;
      border-radius:6px;
      white-space:nowrap;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
    ">${iata}</div>`,
    iconAnchor: [20, 12],
  });
  return L.marker([lat, lon], { icon });
}


// ════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ════════════════════════════════════════════════════════════

let origAirport = null;
let destAirport = null;

function lookupAirport(iata, infoEl, isOrigin) {
  iata = iata.toUpperCase().trim();
  if (iata.length < 3) {
    infoEl.innerHTML = '';
    if (isOrigin) origAirport = null; else destAirport = null;
    updateButton();
    return;
  }
  // If DB is still loading, show a spinner and wait
  if (!dbLoaded) {
    infoEl.innerHTML = '<div class="airport-searching">Loading database…</div>';
    if (isOrigin) origAirport = null; else destAirport = null;
    updateButton();
    return;
  }
  const ap = lookupCode(iata);
  if (ap) {
    infoEl.innerHTML =
      '<div class="airport-name">' + ap.name + '</div>' +
      '<div class="airport-meta">' + (ap.city ? ap.city + ' · ' : '') + ap.country + '</div>';
    if (isOrigin) origAirport = ap; else destAirport = ap;
  } else {
    infoEl.innerHTML = '<div class="airport-error">Code not found in database</div>';
    if (isOrigin) origAirport = null; else destAirport = null;
  }
  updateButton();
}

function updateButton() {
  document.getElementById('calcBtn').disabled = !(origAirport && destAirport);
}

// Wire up the input listeners — fires after user types a 3-character code
document.getElementById('origInput').addEventListener('input', function() {
  lookupAirport(this.value, document.getElementById('origInfo'), true);
});
document.getElementById('destInput').addEventListener('input', function() {
  lookupAirport(this.value, document.getElementById('destInfo'), false);
});

// Also allow pressing Enter to trigger the plot
document.getElementById('origInput').addEventListener('keydown', e => { if (e.key==='Enter' && origAirport && destAirport) plotRoute(); });
document.getElementById('destInput').addEventListener('keydown', e => { if (e.key==='Enter' && origAirport && destAirport) plotRoute(); });


// ════════════════════════════════════════════════════════════
//  MAIN PLOT FUNCTION
// ════════════════════════════════════════════════════════════

function plotRoute() {
  if (!origAirport || !destAirport) return;

  clearRoute();
  document.getElementById('mapEmpty').classList.add('hidden');

  const o = origAirport;
  const d = destAirport;

  // Calculate distance
  const distKm    = haversineKm(o.lat, o.lon, d.lat, d.lon);
  const distMiles = distKm * 0.621371;

  // Generate the great circle arc points
  const gcPoints = greatCirclePoints(o.lat, o.lon, d.lat, d.lon, 120);
  // Split across antimeridian to avoid the line wrapping around the globe
  const segments = splitAtAntimeridian(gcPoints);

  // Draw each segment as a dashed arc line
  segments.forEach(seg => {
    const line = L.polyline(seg, {
      color: '#f0a500',
      weight: 2.5,
      opacity: 0.9,
      dashArray: '6, 5',
      lineCap: 'round',
    }).addTo(map);
    routeLayers.push(line);
  });

  // Add airport markers
  const origMarker = makeMarker(o.lat, o.lon, o.iata, '#f0a500').addTo(map);
  const destMarker = makeMarker(d.lat, d.lon, d.iata, '#e05c2a').addTo(map);
  routeLayers.push(origMarker, destMarker);

  // Fit map to show the full route with padding
  const allPoints = segments.flat();
  if (allPoints.length > 0) {
    map.fitBounds(L.latLngBounds(allPoints), { padding: [40, 40] });
  }

  // Update results panel
  document.getElementById('resOrig').textContent  = o.iata;
  document.getElementById('resDest').textContent  = d.iata;
  document.getElementById('resDist').textContent  = Math.round(distKm).toLocaleString();
  document.getElementById('resMiles').textContent = Math.round(distMiles).toLocaleString();
  document.getElementById('resOrigCoords').textContent = `${o.lat.toFixed(2)}°, ${o.lon.toFixed(2)}°`;
  document.getElementById('resDestCoords').textContent = `${d.lat.toFixed(2)}°, ${d.lon.toFixed(2)}°`;
  document.getElementById('results').classList.add('visible');
}


// ════════════════════════════════════════════════════════════
//  INITIALISE — airport data is inline, nothing to load
// ════════════════════════════════════════════════════════════
</script>
</body>
</html>
